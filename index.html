<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Werte-Test · Was ist Ihnen im Leben wichtig?</title>
    <style>
      :root {
        --ink: #2D373C;
        --muted: #6c7280;
        --faint: #9aa0ac;
        --line: #e6e8ed;
        --paper: #f6f7f9;
        --card: #ffffff;
        --mint: #6fb4b0; /* Ihr Ergebnis */
        --mint-soft: #D2EBE9;
        --amber: #dd8a3c; /* CH-Stichprobe */
        --amber-soft: rgba(30, 30, 29, 0.16);
        --radius: 14px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        /* Schrift wird von der einbettenden Seite übernommen.
           Optional per ?font=... überschreibbar (siehe Script unten). */
        font-family: inherit;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        max-width: 660px;
        margin: 0 auto;
        padding: 38px 22px 56px;
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--mint);
        font-weight: 600;
        margin: 0 0 14px;
      }
      h1 {
        font-weight: 600;
        font-size: 32px;
        line-height: 1.18;
        margin: 0 0 16px;
        letter-spacing: -0.01em;
      }
      .lead {
        color: var(--muted);
        font-size: 16.5px;
        margin: 0 0 26px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 28px 26px;
        box-shadow: 0 1px 2px rgba(20, 22, 30, 0.03);
      }

      /* ---- Skalen-Legende (Intro) ---- */
      .scale-key {
        list-style: none;
        margin: 0 0 28px;
        padding: 0;
        display: grid;
        gap: 8px;
      }
      .scale-key li {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 14.5px;
        color: var(--ink);
      }
      .num {
        flex: 0 0 auto;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 13px;
        font-weight: 600;
        background: var(--mint-soft);
        color: var(--mint);
      }
      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin: 0 0 28px;
      }
      .pill {
        font-size: 12.5px;
        color: var(--muted);
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 11px;
      }

      /* ---- Buttons ---- */
      .btn {
        appearance: none;
        cursor: pointer;
        border: none;
        border-radius: 11px;
        font-family: inherit;
        font-size: 15.5px;
        font-weight: 600;
        padding: 14px 24px;
        background: var(--ink);
        color: #fff;
        transition:
          transform 0.12s ease,
          opacity 0.12s ease;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
        font-family: inherit;
        font-weight: 500;
        font-size: 14px;
        padding: 8px 10px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
      }
      .btn-ghost:hover {
        background: var(--paper);
        opacity: 1;
      }

      /* ---- Fortschritt ---- */
      .progress-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
        min-height: 30px;
      }
      .counter {
        font-size: 13px;
        color: var(--faint);
        letter-spacing: 0.04em;
      }
      .bar {
        height: 5px;
        background: var(--line);
        border-radius: 99px;
        overflow: hidden;
        margin-bottom: 26px;
      }
      .bar > i {
        display: block;
        height: 100%;
        width: 0;
        background: var(--mint);
        border-radius: 99px;
        transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ---- Frage ---- */
      .statement {
        font-weight: 500;
        font-size: 21px;
        line-height: 1.4;
        margin: 0 0 8px;
      }
      .prompt {
        font-size: 13.5px;
        color: var(--faint);
        margin: 0 0 22px;
      }
      .options {
        display: grid;
        gap: 9px;
      }
      .opt {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        text-align: left;
        cursor: pointer;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 13px 15px;
        font-family: inherit;
        font-size: 15px;
        color: var(--ink);
        transition:
          border-color 0.12s ease,
          background 0.12s ease,
          transform 0.08s ease;
      }
      .opt:hover {
        border-color: #c7cbd6;
        background: #fbfbfc;
      }
      .opt:active {
        transform: scale(0.995);
      }
      .opt .dot {
        flex: 0 0 auto;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        border: 1.5px solid var(--line);
        font-weight: 600;
        font-size: 14px;
        color: var(--muted);
        transition: all 0.12s ease;
      }
      .opt[aria-pressed="true"] {
        border-color: var(--mint);
        background: var(--mint-soft);
      }
      .opt[aria-pressed="true"] .dot {
        background: var(--mint);
        border-color: var(--mint);
        color: #fff;
      }
      .opt:focus-visible,
      .btn:focus-visible,
      .btn-ghost:focus-visible {
        outline: 2.5px solid var(--mint);
        outline-offset: 2px;
      }

      /* ---- Ergebnis ---- */
      .result-head {
        text-align: center;
        margin-bottom: 6px;
      }
      .result-head .eyebrow {
        margin-bottom: 10px;
      }
      .chart-box {
        margin: 6px 0 4px;
      }
      svg.radar {
        display: block;
        width: 100%;
        height: auto;
        margin: 0 auto;
      }
      /* Eine konsistente, gut lesbare Schriftgröße für alle Diagramm-Texte.
         Die Größen wachsen auf schmalen Viewports mit, damit sie trotz
         Skalierung der viewBox lesbar bleiben. */
      svg.radar text {
        font-family: inherit;
      }
      svg.radar .axis-label {
        font-size: 22px;
        font-weight: 600;
        fill: #2D373C;
      }
      svg.radar .tick {
        font-size: 18px;
        fill: #b7bcc7;
      }
      @media (max-width: 560px) {
        svg.radar .axis-label {
          font-size: 27px;
        }
        svg.radar .tick {
          font-size: 22px;
        }
      }
      @media (max-width: 400px) {
        svg.radar .axis-label {
          font-size: 32px;
        }
        svg.radar .tick {
          font-size: 26px;
        }
      }
      .legend {
        display: flex;
        gap: 22px;
        justify-content: center;
        flex-wrap: wrap;
        margin: 8px 0 30px;
      }
      .legend span {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13.5px;
        color: var(--muted);
      }
      .swatch {
        width: 13px;
        height: 13px;
        border-radius: 4px;
        flex: 0 0 auto;
      }
      .swatch.you {
        background: var(--mint);
      }
      .swatch.ch {
        background: var(--amber);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      table th {
        font-weight: 500;
        color: var(--faint);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        text-align: right;
        padding: 0 0 10px;
      }
      table th:first-child {
        text-align: left;
      }
      table td {
        padding: 11px 0;
        border-top: 1px solid var(--line);
        vertical-align: middle;
      }
      td.name {
        font-weight: 500;
      }
      td.barcell {
        width: 42%;
        padding-left: 16px;
      }
      td.score {
        text-align: right;
        font-variant-numeric: tabular-nums;
        width: 56px;
        font-weight: 600;
      }
      td.score.you {
        color: var(--mint);
      }
      td.score.ch {
        color: var(--amber);
        font-weight: 500;
      }
      .minibar {
        position: relative;
        height: 8px;
        background: var(--paper);
        border-radius: 99px;
      }
      .minibar i {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        border-radius: 99px;
      }
      .minibar .b-ch {
        background: var(--amber);
        opacity: 0.55;
      }
      .minibar .b-you {
        background: var(--mint);
      }

      .footnote {
        font-size: 12px;
        color: var(--faint);
        margin: 26px 0 0;
        line-height: 1.5;
      }
      .center {
        text-align: center;
      }
      .mt28 {
        margin-top: 28px;
      }

      .fade {
        animation: fade 0.4s ease both;
      }
      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
      @media (max-width: 480px) {
        .wrap {
          padding: 26px 16px 44px;
        }
        h1 {
          font-size: 27px;
        }
        .statement {
          font-size: 19px;
        }
        .card {
          padding: 22px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main id="app" aria-live="polite"></main>
    </div>

    <script>
      "use strict";

      /* ---------- Daten (1:1 aus Agora_PQ21_Wertetest.xlsx) ---------- */
      // Reihenfolge der Aussagen wie im Tabellenblatt "Fragen" (Zeilen 5–25).
      const QUESTIONS = [
        {
          code: "SD1",
          value: "Selbstbestimmung",
          text: "Es ist Ihnen wichtig, neue Ideen zu entwickeln und kreativ zu sein. Sie machen Sachen gerne auf ihre eigene originelle Art und Weise.",
        },
        {
          code: "PO1",
          value: "Macht",
          text: "Es ist Ihnen wichtig, reich zu sein. Sie möchten viel Geld haben und teure Sachen besitzen.",
        },
        {
          code: "UN1",
          value: "Universalismus",
          text: "Sie halten es für wichtig, dass alle Menschen auf der Welt gleichbehandelt werden sollten. Sie glauben, dass jeder Mensch im Leben gleiche Chancen haben sollte.",
        },
        {
          code: "AC1",
          value: "Leistung",
          text: "Es ist Ihnen wichtig, ihre Fähigkeiten zu zeigen. Sie möchten, dass die Leute bewundern, was sie tun.",
        },
        {
          code: "SE1",
          value: "Sicherheit",
          text: "Es ist Ihnen wichtig, in einem sicheren Umfeld zu leben. Sie vermeiden alles, was ihre Sicherheit gefährden könnte.",
        },
        {
          code: "ST1",
          value: "Stimulation",
          text: "Sie mögen Überraschungen und halten immer Ausschau nach neuen Aktivitäten. Sie denken, dass im Leben Abwechslung wichtig ist.",
        },
        {
          code: "CO1",
          value: "Konformität",
          text: "Sie glauben, dass die Menschen tun sollten, was man ihnen sagt. Sie denken, dass Menschen sich immer an Regeln halten sollten, auch wenn es niemand sieht.",
        },
        {
          code: "UN2",
          value: "Universalismus",
          text: "Es ist Ihnen wichtig, Menschen zuzuhören, die anders sind als sie. Auch wenn sie nicht ihrer Meinung sind, wollen sie sie trotzdem verstehen.",
        },
        {
          code: "TR1",
          value: "Tradition",
          text: "Es ist Ihnen wichtig, zurückhaltend und bescheiden zu sein. Sie versuchen, die Aufmerksamkeit nicht auf sich zu lenken.",
        },
        {
          code: "HE1",
          value: "Hedonismus",
          text: "Es ist Ihnen wichtig, Spass zu haben. Sie gönnen sich selbst gerne etwas.",
        },
        {
          code: "SD2",
          value: "Selbstbestimmung",
          text: "Es ist Ihnen wichtig, selbst zu entscheiden, was sie tun. Sie sind gerne frei und unabhängig von anderen.",
        },
        {
          code: "BE1",
          value: "Wohlwollen",
          text: "Es ist Ihnen sehr wichtig, den Menschen um sie herum zu helfen. Sie wollen für deren Wohl sorgen.",
        },
        {
          code: "AC2",
          value: "Leistung",
          text: "Es ist Ihnen wichtig, sehr erfolgreich zu sein. Sie hoffen, dass die Leute ihre Leistungen anerkennen.",
        },
        {
          code: "SE2",
          value: "Sicherheit",
          text: "Es ist Ihnen wichtig, dass der Staat ihre persönliche Sicherheit vor allen Bedrohungen gewährleistet. Sie wollen einen starken Staat, der seine Bürger verteidigt.",
        },
        {
          code: "ST2",
          value: "Stimulation",
          text: "Sie suchen das Abenteuer und gehen gerne Risiken ein. Sie wollen ein aufregendes Leben haben.",
        },
        {
          code: "CO2",
          value: "Konformität",
          text: "Es ist Ihnen wichtig, sich jederzeit korrekt zu verhalten. Sie vermeiden es, Dinge zu tun, die andere Leute für falsch halten könnten.",
        },
        {
          code: "PO2",
          value: "Macht",
          text: "Es ist Ihnen wichtig, dass andere sie respektieren. Sie wollen, dass die Leute tun, was sie sagen.",
        },
        {
          code: "BE2",
          value: "Wohlwollen",
          text: "Es ist Ihnen wichtig, ihren Freunden gegenüber loyal zu sein. Sie wollen sich für Menschen einsetzen, die Ihnen nahestehen.",
        },
        {
          code: "UN3",
          value: "Universalismus",
          text: "Sie sind fest davon überzeugt, dass die Menschen sich um die Natur kümmern sollten. Umweltschutz ist Ihnen wichtig.",
        },
        {
          code: "TR2",
          value: "Tradition",
          text: "Tradition ist Ihnen wichtig. Sie versuchen, sich an die Sitten und Gebräuche zu halten, die Ihnen von ihrer Religion oder ihrer Familie überliefert wurden.",
        },
        {
          code: "HE2",
          value: "Hedonismus",
          text: "Sie lassen keine Gelegenheit aus, Spass zu haben. Es ist Ihnen wichtig, Dinge zu tun, die Ihnen Vergnügen bereiten.",
        },
      ];

      // Achsen-Reihenfolge wie im Tabellenblatt (E4:N4).
      const VALUE_ORDER = [
        "Universalismus",
        "Wohlwollen",
        "Tradition",
        "Konformität",
        "Sicherheit",
        "Macht",
        "Leistung",
        "Hedonismus",
        "Stimulation",
        "Selbstbestimmung",
      ];

      // Repräsentative Stichprobe Schweiz (ESS-Daten, n=2664) – Zeile 6, E6:N6.
      const ESS = {
        Universalismus: 4.99,
        Wohlwollen: 5.21,
        Tradition: 4.31,
        Konformität: 3.9,
        Sicherheit: 4.52,
        Macht: 3.18,
        Leistung: 3.67,
        Hedonismus: 4.2,
        Stimulation: 3.65,
        Selbstbestimmung: 4.88,
      };

      const SCALE = [
        [1, "überhaupt nicht ähnlich"],
        [2, "nicht ähnlich"],
        [3, "ein kleines bisschen ähnlich"],
        [4, "etwas ähnlich"],
        [5, "ähnlich"],
        [6, "sehr ähnlich"],
      ];

      /* ---------- State ---------- */
      const app = document.getElementById("app");
      const answers = new Array(QUESTIONS.length).fill(null);
      const INTRO = -1;
      const RESULT = QUESTIONS.length;
      let idx = INTRO; // -1 = Intro, 0..20 = Fragen, RESULT = Ergebnis

      // Optional: Schriftart von der einbettenden Seite per ?font=... setzen.
      const fontParam = new URLSearchParams(location.search).get("font");
      if (fontParam) {
        document.documentElement.style.fontFamily = fontParam;
      }

      /* ---------- Rendering ---------- */
      function render() {
        if (idx === INTRO) renderIntro();
        else if (idx === RESULT) renderResult();
        else renderQuestion(idx);
      }

      function el(html) {
        const t = document.createElement("template");
        t.innerHTML = html.trim();
        return t.content.firstElementChild;
      }

      function esc(s) {
        return s.replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );
      }

      function renderIntro() {
        const keyItems = SCALE.map(
          ([n, l]) => `<li><span class="num">${n}</span>${esc(l)}</li>`,
        ).join("");
        const pills = VALUE_ORDER.map(
          (v) => `<span class="pill">${esc(v)}</span>`,
        ).join("");
        app.replaceChildren(
          el(`
        <section class="fade">
          <p class="eyebrow">Werte-Test</p>
          <h1>Was ist Ihnen im Leben wichtig?<br>Finden Sie es heraus.</h1>
          <p class="lead">Nachfolgend finden Sie 21 Aussagen zu Personen. Lesen Sie jede und entscheiden Sie: Wie ähnlich sind Sie der beschriebenen Person?</p>
          <div class="card">
            <ul class="scale-key">${keyItems}</ul>
            <div class="pills">${pills}</div>
            <button class="btn" id="start">Test starten</button>
          </div>
          <p class="footnote">Der Test basiert auf dem Wertemodell von Shalom Schwartz (Portrait Values Questionnaire, PVQ‑21). Ihre Antworten werden ausschliesslich in Ihrem Browser ausgewertet.</p>
        </section>
      `),
        );
        document.getElementById("start").addEventListener("click", () => {
          idx = 0;
          render();
          scrollTop();
        });
      }

      function renderQuestion(i) {
        const q = QUESTIONS[i];
        const pct = Math.round((i / QUESTIONS.length) * 100);
        const opts = SCALE.map(
          ([n, l]) => `
        <button class="opt" data-val="${n}" aria-pressed="${answers[i] === n}">
          <span class="dot">${n}</span><span>${esc(l)}</span>
        </button>`,
        ).join("");
        app.replaceChildren(
          el(`
        <section class="fade">
          <div class="progress-head">
            ${i > 0 ? '<button class="btn-ghost" id="back">← Zurück</button>' : "<span></span>"}
            <span class="counter">Frage ${i + 1} / ${QUESTIONS.length}</span>
          </div>
          <div class="bar"><i style="width:${pct}%"></i></div>
          <div class="card">
            <p class="statement">${esc(q.text)}</p>
            <p class="prompt">Wie ähnlich sind Sie dieser Person?</p>
            <div class="options" id="opts">${opts}</div>
          </div>
        </section>
      `),
        );
        app.querySelectorAll(".opt").forEach((b) => {
          b.addEventListener("click", () => {
            answers[i] = Number(b.dataset.val);
            app
              .querySelectorAll(".opt")
              .forEach((x) => x.setAttribute("aria-pressed", x === b));
            // kurze Verzögerung, damit die Auswahl sichtbar wird, bevor weitergeblättert wird
            setTimeout(() => {
              idx = i + 1;
              render();
              scrollTop();
            }, 180);
          });
        });
        const back = document.getElementById("back");
        if (back) {
          back.addEventListener("click", () => {
            idx = i - 1;
            render();
            scrollTop();
          });
        }
      }

      /* ---------- Auswertung (Mittelwerte je Wert, analog AVERAGE-Formeln) ---------- */
      function computeScores() {
        const out = {};
        VALUE_ORDER.forEach((v) => {
          const vals = QUESTIONS.map((q, i) =>
            q.value === v ? answers[i] : null,
          ).filter((x) => x != null);
          out[v] = vals.reduce((a, b) => a + b, 0) / vals.length;
        });
        return out;
      }

      function renderResult() {
        const you = computeScores();

        const rows = VALUE_ORDER.map((v) => {
          const y = you[v];
          const c = ESS[v];
          // Score (1–6) -> Balkenbreite in Prozent (0–100):
          // (wert - 1) verschiebt auf 0–5, / 5 normiert auf 0–1, * 100 ergibt Prozent.
          const yp = ((y - 1) / 5) * 100; // Balken "Ihr Ergebnis"
          const cp = ((c - 1) / 5) * 100; // Balken "Schweiz"
          return `<tr>
          <td class="name">${esc(v)}</td>
          <td class="barcell"><div class="minibar">
            <i class="b-ch" style="width:${cp}%"></i>
            <i class="b-you" style="width:${yp}%"></i>
          </div></td>
          <td class="score you">${y.toFixed(1)}</td>
          <td class="score ch">${c.toFixed(1)}</td>
        </tr>`;
        }).join("");

        app.replaceChildren(
          el(`
        <section class="fade">
          <div class="result-head">
            <p class="eyebrow">Ergebnis</p>
            <h1>Ihr Werteprofil</h1>
          </div>
          <div class="card">
            <div class="chart-box">${radarSVG(you)}</div>
            <div class="legend">
              <span><span class="swatch you"></span>Ihr Ergebnis</span>
              <span><span class="swatch ch"></span>Schweiz (Durchschnitt)</span>
            </div>
            <table>
              <thead><tr><th>Wert</th><th></th><th>Sie</th><th>CH</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
          <div class="center mt28"><button class="btn" id="restart">Test wiederholen</button></div>
          <p class="footnote">Skala 1–6. Werte sind Mittelwerte der jeweils zugehörigen Aussagen. Vergleichsdaten: European Social Survey, Schweiz (n = 2664).</p>
        </section>
      `),
        );
        document.getElementById("restart").addEventListener("click", () => {
          answers.fill(null);
          idx = INTRO;
          render();
          scrollTop();
        });
        // Daten-Polygone nach dem Mount sanft einblenden
        requestAnimationFrame(() => {
          const g = document.getElementById("radar-data");
          if (g) g.style.opacity = 1;
        });
      }

      /* ---------- Radar / Spider-Chart (reines SVG) ---------- */
      function radarSVG(you) {
        const N = VALUE_ORDER.length;
        const cx = 380;
        const cy = 300;
        const R = 180;
        const ang = (i) => ((-90 + i * (360 / N)) * Math.PI) / 180;
        const rad = (v) => ((v - 1) / 5) * R; // Wert 1 -> Mitte, 6 -> Aussenkante
        const pt = (i, r) => [
          cx + Math.cos(ang(i)) * r,
          cy + Math.sin(ang(i)) * r,
        ];
        const poly = (vals) =>
          VALUE_ORDER.map((v, i) =>
            pt(i, rad(vals[v]))
              .map((n) => n.toFixed(1))
              .join(","),
          ).join(" ");

        // Gitter-Ringe (Zehnecke) für Werte 2..6
        let grid = "";
        for (let g = 2; g <= 6; g++) {
          const p = VALUE_ORDER.map((_, i) =>
            pt(i, rad(g))
              .map((n) => n.toFixed(1))
              .join(","),
          ).join(" ");
        
          grid += `<polygon points="${p}" fill="none" stroke="#e6e8ed" stroke-width="1"/>`;
        }
        // Speichen + Skalenzahlen
        let spokes = "";
        let ticks = "";
        for (let i = 0; i < N; i++) {
          const [x, y] = pt(i, R);
          spokes += `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#edeff3" stroke-width="1"/>`;
        }
        for (let g = 2; g <= 6; g++) {
          const [, y] = pt(0, rad(g));
          ticks += `<text class="tick" x="${cx + 8}" y="${(y + 4).toFixed(1)}">${g}</text>`;
        }
        // Achsenbeschriftungen aussen
        let labels = "";
        VALUE_ORDER.forEach((v, i) => {
          const a = ang(i);
          const lx = cx + Math.cos(a) * (R + 22);
          const ly = cy + Math.sin(a) * (R + 22);
          const cos = Math.cos(a);
          let anchor = "middle";
          let dx = 0;
          if (cos > 0.3) {
            anchor = "start";
            dx = 2;
          } else if (cos < -0.3) {
            anchor = "end";
            dx = -2;
          }
          const dy = Math.sin(a) > 0.6 ? 12 : Math.sin(a) < -0.6 ? -4 : 4;
          labels += `<text class="axis-label" x="${(lx + dx).toFixed(1)}" y="${(ly + dy).toFixed(1)}" text-anchor="${anchor}">${esc(v)}</text>`;
        });

        const essPoly = poly(ESS);
        const youPoly = poly(you);
        const youDots = VALUE_ORDER.map((v, i) => {
          const [x, y] = pt(i, rad(you[v]));
          return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.2" fill="#6fb4b0"/>`;
        }).join("");

        return `<svg class="radar" viewBox="0 0 760 600" role="img" aria-label="Radardiagramm Ihres Werteprofils im Vergleich zur Schweizer Stichprobe">
        ${grid}${spokes}${ticks}
        <g id="radar-data" style="opacity:0;transition:opacity .6s ease">
          <polygon points="${essPoly}" fill="rgba(221,138,60,.16)" stroke="#dd8a3c" stroke-width="1.6" stroke-linejoin="round"/>
          <polygon points="${youPoly}" fill="rgba(42,68,201,.14)" stroke="#6fb4b0" stroke-width="2.2" stroke-linejoin="round"/>
          ${youDots}
        </g>
        ${labels}
      </svg>`;
      }

      /* ---------- Hilfen ---------- */
      function scrollTop() {
        try {
          window.scrollTo(0, 0);
        } catch {
          /* no-op */
        }
      }

      /* ---------- Start ---------- */
      render();
    </script>
  </body>
</html>
